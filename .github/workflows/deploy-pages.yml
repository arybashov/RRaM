name: deploy-client-pages

# Публикует веб-клиент (папку prototype-web) на GitHub Pages при пуше в main.
on:
  push:
    branches: [main]
    paths:
      - 'prototype-web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать два деплоя одновременно; новый отменяет предыдущий.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype-web
      - id: deployment
        uses: actions/deploy-pages@v4
