name: keep-render-awake

# Render free засыпает после 15 мин простоя. Пингуем /health, чтобы сервер
# не уходил в сон и у игроков не было холодного старта на 30-60 сек.
on:
  schedule:
    # Каждые 10 минут (UTC). GitHub может задерживать запуск под нагрузкой —
    # если сервер всё равно иногда засыпает, уменьшить до '*/5 * * * *'.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # ручной запуск из вкладки Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 \
              https://rram-server.onrender.com/health) || code=000
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "server did not return 200 after 3 attempts"
          exit 1
