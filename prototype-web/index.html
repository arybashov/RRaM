<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RRaM</title>
    <link rel="stylesheet" href="./styles.css?v=20260612-inventory1" />
  </head>
  <body>
    <main class="app">
      <!-- Тонкая шапка: лого · статус хода · связь+меню -->
      <header class="topbar">
        <div class="tb-left"><h1>RRaM</h1></div>
        <div class="tb-center">
          <p id="turnInfo" class="turn-status" aria-live="polite">Загрузка…</p>
        </div>
        <div class="tb-right"></div>
      </header>

      <!-- Борд — на всё доступное пространство -->
      <section class="board-wrap" aria-label="Карта">
        <div id="board" class="board" role="group" aria-label="Игровая карта"></div>
        <div class="board-controls">
          <button id="focusBtn" class="board-ctl" aria-label="К моим фишкам" title="К моим фишкам">◎</button>
          <button id="fitBtn" class="board-ctl" aria-label="Вся карта" title="Вся карта">⤢</button>
        </div>
      </section>

      <!-- Плавающий док действий -->
      <section class="dock" aria-label="Действия">
        <div class="dock-dice">
          <button class="die" id="die1" data-die="0">–</button>
          <button class="die" id="die2" data-die="1">–</button>
          <button id="endTurnBtn">Конец хода</button>
        </div>

        <div class="dock-modes">
          <button class="mode active" data-mode="moveSum">Движение</button>
          <button class="mode" data-mode="transfer">Передать</button>
          <button class="mode" data-mode="draw">Карта</button>
          <button class="mode" data-mode="teleport">Телепорт</button>
        </div>
      </section>

      <!-- Шторка: инвентарь + журнал (сворачиваемая) -->
      <section class="sheet" id="sheet" aria-label="Инвентарь и журнал">
        <button class="sheet-handle" id="sheetHandle" aria-expanded="false">
          <span class="sheet-handle-arrow">▲</span> Журнал · Инвентарь
        </button>
        <div class="sheet-body">
          <h2 id="inventoryTitle">Персонаж</h2>
          <div id="inventory" class="inventory empty">Выберите персонажа.</div>
          <h2>Журнал</h2>
          <div class="chat-input-row sheet-chat">
            <input id="gameChatInput" type="text" placeholder="Сообщение сопернику…" maxlength="200" autocomplete="off" />
            <button id="gameChatSend" aria-label="Отправить">➤</button>
          </div>
          <div id="log" class="log" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="./game.js?v=20260612-inventory1"></script>
  </body>
</html>
