server {
    listen 80;
    server_name rram.com.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rram.com.ru;

    ssl_certificate     /etc/letsencrypt/live/rram.com.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rram.com.ru/privkey.pem;

    # Статика веб-клиента (деплоится в /var/www/rram скриптом deploy-web.sh)
    root /var/www/rram;
    index index.html;

    # Игровой WebSocket — проксируется на Fastify-сервер
    location /ws {
        proxy_pass http://127.0.0.1:8787/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location /health {
        proxy_pass http://127.0.0.1:8787/health;
    }

    # Версионированные ассеты (js/css грузятся с ?v=<версия сборки>; картинки
    # имеют -vN в имени файла). URL меняется при каждой новой версии, поэтому
    # их можно кэшировать «навсегда» — старый URL никогда не переиспользуется.
    location ~* \.(?:js|css|woff2?|png|jpe?g|webp|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Точка входа и SPA-фоллбэк — НИКОГДА не кэшировать у клиента.
    # Иначе браузер по эвристике держит старый index.html со старым ?v= и
    # тянет устаревший game.js → у игрока «ничего не работает». ETag/Last-Modified
    # остаются, ревалидация дешёвая (304). Именно это лечит «не обновляют клиента».
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
